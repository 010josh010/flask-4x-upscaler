{% extends "base.html" %}
{% block content %}
<a class="btn-outline back-link" href="{{ url_for('index') }}">
  <i class="fa-solid fa-arrow-left"></i> Back to Upload
</a>
<h2>Your Upscaled Image</h2>
<p>Right-click the image to save it, or use the Download button for a save prompt.</p>

<div class="preview">
  <img src="{{ preview_url }}" alt="Upscaled preview">
</div>

<div class="actions-row">
  <a class="btn-outline" href="{{ download_url }}">
    <i class="fa-solid fa-download"></i> Download Upscaled Image
  </a>
</div>

{% endblock %}
